<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients – MediCore HMS</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    #patient-modal, #view-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.55);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #patient-modal.open, #view-modal.open { display: flex; }
    .modal { animation: modalIn .22s ease; }
    @keyframes modalIn {
      from { opacity:0; transform: scale(.95) translateY(12px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .btn:active:not(:disabled) { transform: scale(.97); }
    @media (max-width: 900px) { .hide-sm { display: none !important; } }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr !important; } }

    .tab-btn { cursor: pointer; }
    .tab-btn.active { color: var(--teal-700); border-bottom: 2px solid var(--teal-600); }
  </style>
</head>
<body>
  <div class="page-loader" id="loader">
    <div class="page-loader-inner"><div class="loader-ring"></div></div>
  </div>

  <div class="app-shell">
    <div class="main-content" id="main">

      <div class="page-header">
        <div class="page-header-title">
          <h2>Patient Records</h2>
          <p>Register and manage all hospital patients.</p>
        </div>
        <button class="btn btn-primary" id="add-btn">＋ Register Patient</button>
      </div>

      <div class="card section">
        <div class="card-header">
          <div class="search-bar" style="flex-wrap:wrap;gap:.6rem;">
            <div class="search-input-wrap" style="flex:1;min-width:180px;">
              <span class="search-icon">🔍</span>
              <input id="search-input" class="search-input" placeholder="Search by name, ID, phone…" />
            </div>
            <select id="filter-status" class="form-control" style="width:160px;">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
            <select id="filter-blood" class="form-control" style="width:140px;">
              <option value="">All Blood Types</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Patient ID</th>
                <th>Name</th>
                <th class="hide-sm">Age/Gender</th>
                <th class="hide-sm">Contact</th>
                <th class="hide-sm">Blood Type</th>
                <th class="hide-sm">Registered</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="patients-table">
              <tr><td colspan="8" class="empty-state"><div class="empty-icon">🧑‍⚕️</div><p>Loading…</p></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD / EDIT MODAL -->
  <div id="patient-modal">
    <div class="modal" style="max-width:640px;width:100%;">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Register New Patient</span>
        <button class="modal-close" id="pm-close" type="button">✕</button>
      </div>
      <div class="modal-body" style="max-height:68vh;overflow-y:auto;">
        <input type="hidden" id="edit-id" />
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input id="p-name" class="form-control" placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label>Date of Birth *</label>
            <input id="p-dob" type="date" class="form-control" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Gender *</label>
            <select id="p-gender" class="form-control">
              <option value="">— Select —</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Blood Type</label>
            <select id="p-blood" class="form-control">
              <option value="">Unknown</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
              <option>O+</option><option>O-</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone *</label>
            <input id="p-phone" class="form-control" placeholder="+1 555 0100" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input id="p-email" type="email" class="form-control" placeholder="patient@email.com" />
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input id="p-address" class="form-control" placeholder="123 Main St, City" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Emergency Contact Name</label>
            <input id="p-ecname" class="form-control" placeholder="Jane Doe" />
          </div>
          <div class="form-group">
            <label>Emergency Contact Phone</label>
            <input id="p-ecphone" class="form-control" placeholder="+1 555 0101" />
          </div>
        </div>
        <div class="form-group">
          <label>Known Allergies</label>
          <input id="p-allergies" class="form-control" placeholder="Penicillin, Sulfa, None…" />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="p-notes" class="form-control" rows="2" placeholder="Additional notes…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="pm-cancel" type="button">Cancel</button>
        <button class="btn btn-primary" id="pm-save" type="button">Save Patient</button>
      </div>
    </div>
  </div>

  <!-- VIEW PATIENT MODAL -->
  <div id="view-modal">
    <div class="modal" style="max-width:700px;width:100%;">
      <div class="modal-header">
        <span class="modal-title">Patient Profile</span>
        <button class="modal-close" id="vm-close" type="button">✕</button>
      </div>
      <div class="modal-body" id="view-modal-body" style="max-height:75vh;overflow-y:auto;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="vm-cancel" type="button">Close</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    var currentUser, allPatients = [];

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('add-btn').addEventListener('click', function(){ openModal(null); });
      document.getElementById('pm-save').addEventListener('click', savePatient);
      document.getElementById('pm-cancel').addEventListener('click', closeModal);
      document.getElementById('pm-close').addEventListener('click', closeModal);
      document.getElementById('vm-close').addEventListener('click', closeViewModal);
      document.getElementById('vm-cancel').addEventListener('click', closeViewModal);
      document.getElementById('search-input').addEventListener('input', filterPatients);
      document.getElementById('filter-status').addEventListener('change', filterPatients);
      document.getElementById('filter-blood').addEventListener('change', filterPatients);

      document.getElementById('patient-modal').addEventListener('click', function(e){
        if (e.target === this) closeModal();
      });
      document.getElementById('view-modal').addEventListener('click', function(e){
        if (e.target === this) closeViewModal();
      });
      document.addEventListener('keydown', function(e){
        if (e.key === 'Escape'){ closeModal(); closeViewModal(); }
      });
    });

    async function init() {
      currentUser = await Auth.requireAuth(['admin','doctor','receptionist']);
      Layout.render(currentUser);
      Layout.setTitle('Patient Records');
      loadPatients();
      document.getElementById('loader').classList.add('hidden');
    }

    function loadPatients() {
      db.collection('patients').orderBy('createdAt','desc').onSnapshot(function(snap){
        allPatients = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
        filterPatients();
      });
    }

    function filterPatients() {
      var q      = document.getElementById('search-input').value.toLowerCase();
      var status = document.getElementById('filter-status').value;
      var blood  = document.getElementById('filter-blood').value;
      var filtered = allPatients.filter(function(p){
        var mq = !q || (p.name||'').toLowerCase().includes(q)
                    || (p.patientId||'').toLowerCase().includes(q)
                    || (p.phone||'').includes(q);
        var ms = !status || (p.status||'active') === status;
        var mb = !blood  || p.bloodType === blood;
        return mq && ms && mb;
      });
      renderTable(filtered);
    }

    function renderTable(patients) {
      var tbody = document.getElementById('patients-table');
      if (!patients.length) {
        tbody.innerHTML = Utils.emptyState('No patients found. Click "+ Register Patient" to get started.');
        return;
      }
      tbody.innerHTML = patients.map(function(p) {
        var dob = p.dob ? new Date(p.dob) : null;
        var age = dob ? Math.floor((Date.now() - dob) / 3.156e10) : '—';
        var safeId = (p.id||'').replace(/"/g,'');
        return '<tr>'
          +'<td class="mono text-xs">'+(p.patientId || p.id.slice(0,8))+'</td>'
          +'<td><strong>'+(p.name||'—')+'</strong><br><span class="text-muted text-xs">'+(p.email||'')+'</span></td>'
          +'<td class="hide-sm">'+age+' / '+(p.gender||'—')+'</td>'
          +'<td class="hide-sm">'+(p.phone||'—')+'</td>'
          +'<td class="hide-sm">'+(p.bloodType ? '<span class="badge badge-red">'+p.bloodType+'</span>' : '—')+'</td>'
          +'<td class="hide-sm text-sm">'+Utils.formatDate(p.createdAt)+'</td>'
          +'<td>'+Utils.statusBadge(p.status||'active')+'</td>'
          +'<td><div class="table-actions">'
          +'<button class="btn btn-sm btn-secondary" data-view="'+safeId+'">👁 View</button>'
          +(currentUser.role !== 'doctor' ? '<button class="btn btn-sm btn-secondary" data-edit="'+safeId+'">✏️</button>' : '')
          +(currentUser.role === 'admin'  ? '<button class="btn btn-sm btn-danger" data-del="'+safeId+'" data-name="'+(p.name||'').replace(/"/g,'')+'">🗑</button>' : '')
          +'</div></td>'
          +'</tr>';
      }).join('');

      tbody.querySelectorAll('[data-view]').forEach(function(btn){
        btn.addEventListener('click', function(){ viewPatient(this.dataset.view); });
      });
      tbody.querySelectorAll('[data-edit]').forEach(function(btn){
        btn.addEventListener('click', function(){ editPatient(this.dataset.edit); });
      });
      tbody.querySelectorAll('[data-del]').forEach(function(btn){
        btn.addEventListener('click', function(){ deletePatient(this.dataset.del, this.dataset.name); });
      });
    }

    function openModal(data) {
      document.getElementById('modal-title').textContent = data ? 'Edit Patient' : 'Register New Patient';
      document.getElementById('edit-id').value    = data ? data.id : '';
      document.getElementById('p-name').value     = data ? (data.name||'') : '';
      document.getElementById('p-dob').value      = data ? (data.dob||'') : '';
      document.getElementById('p-gender').value   = data ? (data.gender||'') : '';
      document.getElementById('p-blood').value    = data ? (data.bloodType||'') : '';
      document.getElementById('p-phone').value    = data ? (data.phone||'') : '';
      document.getElementById('p-email').value    = data ? (data.email||'') : '';
      document.getElementById('p-address').value  = data ? (data.address||'') : '';
      document.getElementById('p-ecname').value   = data ? (data.ecName||'') : '';
      document.getElementById('p-ecphone').value  = data ? (data.ecPhone||'') : '';
      document.getElementById('p-allergies').value= data ? (data.allergies||'') : '';
      document.getElementById('p-notes').value    = data ? (data.notes||'') : '';
      var btn = document.getElementById('pm-save');
      btn.disabled    = false;
      btn.textContent = data ? 'Update Patient' : 'Save Patient';
      document.getElementById('patient-modal').classList.add('open');
      setTimeout(function(){ document.getElementById('p-name').focus(); }, 150);
    }

    function closeModal() {
      document.getElementById('patient-modal').classList.remove('open');
    }

    async function savePatient() {
      var name  = document.getElementById('p-name').value.trim();
      var phone = document.getElementById('p-phone').value.trim();
      if (!name)  { Utils.toast('Patient name is required.','error');  document.getElementById('p-name').focus();  return; }
      if (!phone) { Utils.toast('Phone number is required.','error');  document.getElementById('p-phone').focus(); return; }

      var btn = document.getElementById('pm-save');
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';

      var editId = document.getElementById('edit-id').value;
      var payload = {
        name:      name,
        dob:       document.getElementById('p-dob').value,
        gender:    document.getElementById('p-gender').value,
        bloodType: document.getElementById('p-blood').value,
        phone:     phone,
        email:     document.getElementById('p-email').value.trim(),
        address:   document.getElementById('p-address').value.trim(),
        ecName:    document.getElementById('p-ecname').value.trim(),
        ecPhone:   document.getElementById('p-ecphone').value.trim(),
        allergies: document.getElementById('p-allergies').value.trim(),
        notes:     document.getElementById('p-notes').value.trim(),
        status:    'active',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        if (editId) {
          await db.collection('patients').doc(editId).update(payload);
          Utils.toast(name+' updated successfully.', 'success');
        } else {
          payload.patientId = 'PAT-' + Date.now().toString(36).toUpperCase();
          payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('patients').add(payload);
          Utils.toast(name+' registered successfully.', 'success');
        }
        closeModal();
      } catch(err) {
        Utils.toast('Error: '+err.message, 'error');
        btn.disabled    = false;
        btn.textContent = editId ? 'Update Patient' : 'Save Patient';
      }
    }

    function editPatient(id) {
      var p = allPatients.find(function(x){ return x.id === id; });
      if (p) openModal(p);
    }

    async function deletePatient(id, name) {
      if (!confirm('Delete patient "'+name+'"?\nThis cannot be undone.')) return;
      try {
        await db.collection('patients').doc(id).delete();
        Utils.toast(name+' deleted.', 'info');
      } catch(err) {
        Utils.toast('Error: '+err.message, 'error');
      }
    }

    async function viewPatient(id) {
      var p = allPatients.find(function(x){ return x.id === id; });
      if (!p) return;
      var dob = p.dob ? new Date(p.dob) : null;
      var age = dob ? Math.floor((Date.now() - dob) / 3.156e10) : '—';

      var aSnap, tSnap, bSnap;
      try {
        var results = await Promise.all([
          db.collection('appointments').where('patientId','==',id).orderBy('date','desc').limit(5).get(),
          db.collection('treatments').where('patientId','==',id).orderBy('createdAt','desc').limit(5).get(),
          db.collection('bills').where('patientId','==',id).orderBy('createdAt','desc').limit(5).get()
        ]);
        aSnap = results[0]; tSnap = results[1]; bSnap = results[2];
      } catch(e) {
        aSnap = { empty: true, docs: [] };
        tSnap = { empty: true, docs: [] };
        bSnap = { empty: true, docs: [] };
      }

      var apptRows = aSnap.empty
        ? '<tr><td colspan="4" class="empty-state"><p>No appointments.</p></td></tr>'
        : aSnap.docs.map(function(d){
            var a = d.data();
            return '<tr><td>'+a.date+'</td><td>'+a.time+'</td><td>'+(a.doctorName||'—')+'</td><td>'+Utils.statusBadge(a.status)+'</td></tr>';
          }).join('');

      var treatRows = tSnap.empty
        ? '<tr><td colspan="3" class="empty-state"><p>No treatments.</p></td></tr>'
        : tSnap.docs.map(function(d){
            var t = d.data();
            return '<tr><td>'+Utils.formatDate(t.createdAt)+'</td><td>'+(t.diagnosis||'—')+'</td><td>'+(t.doctorName||'—')+'</td></tr>';
          }).join('');

      var billRows = bSnap.empty
        ? '<tr><td colspan="3" class="empty-state"><p>No bills.</p></td></tr>'
        : bSnap.docs.map(function(d){
            var b = d.data();
            return '<tr><td class="mono text-xs">'+(b.billId||d.id.slice(0,8))+'</td><td>'+Utils.currency(b.amount)+'</td><td>'+Utils.statusBadge(b.status)+'</td></tr>';
          }).join('');

      var initials = (p.name||'?').split(' ').map(function(n){ return n[0]; }).join('').toUpperCase().slice(0,2);

      document.getElementById('view-modal-body').innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;">'
        +'<div>'
        +'<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">'
        +'<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--teal-500),var(--teal-800));display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;font-weight:700;flex-shrink:0;">'+initials+'</div>'
        +'<div><h3 style="font-family:\'DM Sans\',sans-serif;">'+p.name+'</h3>'
        +'<p class="text-muted text-sm">'+(p.patientId||p.id.slice(0,8))+'</p></div>'
        +'</div>'
        +'<table style="font-size:.85rem;"><tbody>'
        +'<tr><td style="padding:.3rem .5rem;color:var(--text-muted);">Age/Gender</td><td style="padding:.3rem .5rem;">'+age+' / '+(p.gender||'—')+'</td></tr>'
        +'<tr><td style="padding:.3rem .5rem;color:var(--text-muted);">Blood Type</td><td style="padding:.3rem .5rem;">'+(p.bloodType?'<span class="badge badge-red">'+p.bloodType+'</span>':'—')+'</td></tr>'
        +'<tr><td style="padding:.3rem .5rem;color:var(--text-muted);">Phone</td><td style="padding:.3rem .5rem;">'+(p.phone||'—')+'</td></tr>'
        +'<tr><td style="padding:.3rem .5rem;color:var(--text-muted);">Email</td><td style="padding:.3rem .5rem;">'+(p.email||'—')+'</td></tr>'
        +'<tr><td style="padding:.3rem .5rem;color:var(--text-muted);">Address</td><td style="padding:.3rem .5rem;">'+(p.address||'—')+'</td></tr>'
        +'<tr><td style="padding:.3rem .5rem;color:var(--text-muted);">Allergies</td><td style="padding:.3rem .5rem;">'+(p.allergies||'None')+'</td></tr>'
        +'</tbody></table></div>'
        +'<div>'
        +'<h4 style="font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:.5rem;">Emergency Contact</h4>'
        +'<p style="font-size:.9rem;">'+(p.ecName||'—')+' &bull; '+(p.ecPhone||'—')+'</p>'
        +(p.notes?'<div style="margin-top:1rem;padding:.75rem;background:var(--surface-2);border-radius:8px;font-size:.85rem;"><strong>Notes:</strong> '+p.notes+'</div>':'')
        +'</div></div>'
        +'<div class="tabs">'
        +'<button class="tab-btn active" data-tab="tab-appts">Appointments</button>'
        +'<button class="tab-btn" data-tab="tab-treats">Treatments</button>'
        +'<button class="tab-btn" data-tab="tab-bills">Bills</button>'
        +'</div>'
        +'<div id="tab-appts" class="tab-panel active"><div class="table-wrapper"><table><thead><tr><th>Date</th><th>Time</th><th>Doctor</th><th>Status</th></tr></thead><tbody>'+apptRows+'</tbody></table></div></div>'
        +'<div id="tab-treats" class="tab-panel" style="display:none;"><div class="table-wrapper"><table><thead><tr><th>Date</th><th>Diagnosis</th><th>Doctor</th></tr></thead><tbody>'+treatRows+'</tbody></table></div></div>'
        +'<div id="tab-bills" class="tab-panel" style="display:none;"><div class="table-wrapper"><table><thead><tr><th>Bill ID</th><th>Amount</th><th>Status</th></tr></thead><tbody>'+billRows+'</tbody></table></div></div>';

      // Tab switching
      document.querySelectorAll('#view-modal-body .tab-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          document.querySelectorAll('#view-modal-body .tab-btn').forEach(function(b){ b.classList.remove('active'); });
          document.querySelectorAll('#view-modal-body .tab-panel').forEach(function(p){ p.style.display='none'; });
          this.classList.add('active');
          document.getElementById(this.dataset.tab).style.display = 'block';
        });
      });

      document.getElementById('view-modal').classList.add('open');
    }

    function closeViewModal() {
      document.getElementById('view-modal').classList.remove('open');
    }

    init();
  </script>
</body>
</html>
