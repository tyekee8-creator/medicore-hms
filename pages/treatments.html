<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treatments – MediCore HMS</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    #treatment-modal, #view-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.55);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #treatment-modal.open, #view-modal.open { display: flex; }
    .modal { animation: modalIn .22s ease; }
    @keyframes modalIn {
      from { opacity:0; transform: scale(.95) translateY(12px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .btn:active:not(:disabled) { transform: scale(.97); }
    @media (max-width: 900px) { .hide-sm { display: none !important; } }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr !important; } }
  </style>
</head>
<body>
  <div class="page-loader" id="loader">
    <div class="page-loader-inner"><div class="loader-ring"></div></div>
  </div>

  <div class="app-shell">
    <div class="main-content" id="main">
      <div class="page-header">
        <div class="page-header-title">
          <h2>Treatments & Medical History</h2>
          <p>Record diagnoses, prescriptions, and patient treatment history.</p>
        </div>
        <button class="btn btn-primary" id="add-btn">＋ Add Treatment Record</button>
      </div>

      <div class="card section">
        <div class="card-header">
          <div class="search-bar" style="flex-wrap:wrap;gap:.6rem;">
            <div class="search-input-wrap" style="flex:1;min-width:180px;">
              <span class="search-icon">🔍</span>
              <input id="search-input" class="search-input" placeholder="Search by patient, diagnosis, doctor…" />
            </div>
            <select id="filter-patient" class="form-control" style="width:200px;">
              <option value="">All Patients</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Patient</th><th>Doctor</th>
                <th>Diagnosis</th><th class="hide-sm">Medications</th>
                <th class="hide-sm">Follow-up</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="treatments-table">
              <tr><td colspan="7" class="empty-state"><div class="empty-icon">💊</div><p>Loading…</p></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div id="treatment-modal">
    <div class="modal" style="max-width:680px;width:100%;">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Treatment Record</span>
        <button class="modal-close" id="tm-close" type="button">✕</button>
      </div>
      <div class="modal-body" style="max-height:68vh;overflow-y:auto;">
        <input type="hidden" id="edit-id" />
        <div class="form-row">
          <div class="form-group">
            <label>Patient *</label>
            <select id="t-patient" class="form-control"><option value="">— Select Patient —</option></select>
          </div>
          <div class="form-group">
            <label>Doctor *</label>
            <select id="t-doctor" class="form-control"><option value="">— Select Doctor —</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Visit Date *</label>
            <input id="t-date" type="date" class="form-control" />
          </div>
          <div class="form-group">
            <label>Visit Type</label>
            <select id="t-type" class="form-control">
              <option value="consultation">Consultation</option>
              <option value="follow-up">Follow-up</option>
              <option value="emergency">Emergency</option>
              <option value="procedure">Procedure</option>
              <option value="surgery">Surgery</option>
              <option value="routine-checkup">Routine Checkup</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Symptoms</label>
          <textarea id="t-symptoms" class="form-control" rows="2" placeholder="Patient's reported symptoms…"></textarea>
        </div>
        <div class="form-group">
          <label>Diagnosis *</label>
          <textarea id="t-diagnosis" class="form-control" rows="2" placeholder="Clinical diagnosis…"></textarea>
        </div>
        <div class="form-group">
          <label>Treatment Plan</label>
          <textarea id="t-plan" class="form-control" rows="2" placeholder="Recommended treatment steps…"></textarea>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;justify-content:space-between;">
            Medications
            <button type="button" class="btn btn-secondary btn-sm" id="add-med-btn">＋ Add</button>
          </label>
          <div id="med-rows" style="display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem;"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Lab Tests</label>
            <input id="t-labs" class="form-control" placeholder="CBC, X-Ray, MRI…" />
          </div>
          <div class="form-group">
            <label>Follow-up Date</label>
            <input id="t-followup" type="date" class="form-control" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>BP</label><input id="t-bp" class="form-control" placeholder="120/80 mmHg" /></div>
          <div class="form-group"><label>Temperature</label><input id="t-temp" class="form-control" placeholder="98.6°F" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Weight</label><input id="t-weight" class="form-control" placeholder="70 kg" /></div>
          <div class="form-group"><label>Pulse</label><input id="t-pulse" class="form-control" placeholder="72 bpm" /></div>
        </div>
        <div class="form-group">
          <label>Doctor's Notes</label>
          <textarea id="t-notes" class="form-control" rows="2" placeholder="Confidential notes…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="tm-cancel" type="button">Cancel</button>
        <button class="btn btn-primary" id="tm-save" type="button">Save Record</button>
      </div>
    </div>
  </div>

  <!-- VIEW MODAL -->
  <div id="view-modal">
    <div class="modal" style="max-width:700px;width:100%;">
      <div class="modal-header">
        <span class="modal-title">Treatment Record Detail</span>
        <button class="modal-close" id="vm-close" type="button">✕</button>
      </div>
      <div class="modal-body" id="view-body" style="max-height:75vh;overflow-y:auto;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="vm-cancel" type="button">Close</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    var currentUser, allTreatments = [], patients = [], doctors = [];

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('add-btn').addEventListener('click', function(){ openModal(null); });
      document.getElementById('tm-save').addEventListener('click', saveTreatment);
      document.getElementById('tm-cancel').addEventListener('click', closeModal);
      document.getElementById('tm-close').addEventListener('click', closeModal);
      document.getElementById('vm-close').addEventListener('click', closeViewModal);
      document.getElementById('vm-cancel').addEventListener('click', closeViewModal);
      document.getElementById('add-med-btn').addEventListener('click', function(){ addMedRow({}); });
      document.getElementById('search-input').addEventListener('input', filterTreatments);
      document.getElementById('filter-patient').addEventListener('change', filterTreatments);
      document.getElementById('treatment-modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
      document.getElementById('view-modal').addEventListener('click', function(e){ if(e.target===this) closeViewModal(); });
      document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeModal(); closeViewModal(); } });
    });

    async function init() {
      currentUser = await Auth.requireAuth(['admin','doctor','receptionist']);
      Layout.render(currentUser);
      Layout.setTitle('Treatments & Medical History');
      await Promise.all([loadPatients(), loadDoctors()]);
      loadTreatments();
      document.getElementById('t-date').value = Utils.today();
      document.getElementById('loader').classList.add('hidden');
    }

    async function loadPatients() {
      var snap = await db.collection('patients').orderBy('name').get();
      patients = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
      var opts = patients.map(function(p){ return '<option value="'+p.id+'" data-name="'+(p.name||'').replace(/"/g,'')+'">'+(p.name||'')+'</option>'; }).join('');
      document.getElementById('t-patient').innerHTML = '<option value="">— Select Patient —</option>'+opts;
      document.getElementById('filter-patient').innerHTML = '<option value="">All Patients</option>'+opts;
    }

    async function loadDoctors() {
      var snap = await db.collection('users').where('role','==','doctor').orderBy('name').get();
      doctors = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
      document.getElementById('t-doctor').innerHTML = '<option value="">— Select Doctor —</option>'
        + doctors.map(function(d){ return '<option value="'+d.id+'" data-name="'+(d.name||'').replace(/"/g,'')+'">'+(d.name||'')+' – '+(d.specialization||'General')+'</option>'; }).join('');
    }

    function loadTreatments() {
      var q = currentUser.role==='doctor'
        ? db.collection('treatments').where('doctorId','==',currentUser.uid).orderBy('createdAt','desc')
        : db.collection('treatments').orderBy('createdAt','desc');
      q.onSnapshot(function(snap){
        allTreatments = snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
        filterTreatments();
      });
    }

    function filterTreatments() {
      var q   = document.getElementById('search-input').value.toLowerCase();
      var pid = document.getElementById('filter-patient').value;
      var filtered = allTreatments.filter(function(t){
        var mq = !q || (t.patientName||'').toLowerCase().includes(q) || (t.diagnosis||'').toLowerCase().includes(q) || (t.doctorName||'').toLowerCase().includes(q);
        var mp = !pid || t.patientId===pid;
        return mq && mp;
      });
      renderTable(filtered);
    }

    function renderTable(treatments) {
      var tbody = document.getElementById('treatments-table');
      if (!treatments.length) { tbody.innerHTML = Utils.emptyState('No treatment records found.'); return; }
      tbody.innerHTML = treatments.map(function(t){
        var meds = Array.isArray(t.medications) ? t.medications.map(function(m){ return m.name; }).filter(Boolean).slice(0,2).join(', ')+(t.medications.length>2?'…':'') : '—';
        var safeId = (t.id||'').replace(/"/g,'');
        return '<tr>'
          +'<td class="mono text-sm">'+(t.visitDate||Utils.formatDate(t.createdAt))+'</td>'
          +'<td><strong>'+(t.patientName||'—')+'</strong></td>'
          +'<td>'+(t.doctorName||'—')+'</td>'
          +'<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(t.diagnosis||'—')+'</td>'
          +'<td class="hide-sm text-sm" style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+meds+'</td>'
          +'<td class="hide-sm mono text-sm">'+(t.followUpDate||'—')+'</td>'
          +'<td><div class="table-actions">'
          +'<button class="btn btn-sm btn-secondary" data-view="'+safeId+'">👁 View</button>'
          +'<button class="btn btn-sm btn-secondary" data-edit="'+safeId+'">✏️</button>'
          +(currentUser.role==='admin'?'<button class="btn btn-sm btn-danger" data-del="'+safeId+'">🗑</button>':'')
          +'</div></td></tr>';
      }).join('');

      tbody.querySelectorAll('[data-view]').forEach(function(b){ b.addEventListener('click', function(){ viewTreatment(this.dataset.view); }); });
      tbody.querySelectorAll('[data-edit]').forEach(function(b){ b.addEventListener('click', function(){ editTreatment(this.dataset.edit); }); });
      tbody.querySelectorAll('[data-del]').forEach(function(b){ b.addEventListener('click', function(){ deleteTreatment(this.dataset.del); }); });
    }

    function addMedRow(data) {
      data = data || {};
      var container = document.getElementById('med-rows');
      var div = document.createElement('div');
      div.className = 'med-row';
      div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:.5rem;align-items:center;';
      div.innerHTML = '<input class="form-control med-name" placeholder="Medication name" value="'+(data.name||'')+'" style="font-size:.85rem;" />'
        +'<input class="form-control med-dose" placeholder="Dosage" value="'+(data.dosage||'')+'" style="font-size:.85rem;" />'
        +'<input class="form-control med-freq" placeholder="Frequency" value="'+(data.frequency||'')+'" style="font-size:.85rem;" />'
        +'<button type="button" class="btn btn-danger btn-sm btn-icon remove-med">✕</button>';
      div.querySelector('.remove-med').addEventListener('click', function(){ div.remove(); });
      container.appendChild(div);
    }

    function collectMeds() {
      return Array.from(document.querySelectorAll('.med-row')).map(function(row){
        return { name: row.querySelector('.med-name').value.trim(), dosage: row.querySelector('.med-dose').value.trim(), frequency: row.querySelector('.med-freq').value.trim() };
      }).filter(function(m){ return m.name; });
    }

    function openModal(data) {
      document.getElementById('modal-title').textContent = data ? 'Edit Treatment Record' : 'Add Treatment Record';
      document.getElementById('edit-id').value     = data ? data.id : '';
      document.getElementById('t-patient').value   = data ? (data.patientId||'') : '';
      document.getElementById('t-doctor').value    = data ? (data.doctorId||'') : '';
      document.getElementById('t-date').value      = data ? (data.visitDate||Utils.today()) : Utils.today();
      document.getElementById('t-type').value      = data ? (data.visitType||'consultation') : 'consultation';
      document.getElementById('t-symptoms').value  = data ? (data.symptoms||'') : '';
      document.getElementById('t-diagnosis').value = data ? (data.diagnosis||'') : '';
      document.getElementById('t-plan').value      = data ? (data.treatmentPlan||'') : '';
      document.getElementById('t-labs').value      = data ? (data.labTests||'') : '';
      document.getElementById('t-followup').value  = data ? (data.followUpDate||'') : '';
      document.getElementById('t-bp').value        = data ? (data.vitals&&data.vitals.bp||'') : '';
      document.getElementById('t-temp').value      = data ? (data.vitals&&data.vitals.temp||'') : '';
      document.getElementById('t-weight').value    = data ? (data.vitals&&data.vitals.weight||'') : '';
      document.getElementById('t-pulse').value     = data ? (data.vitals&&data.vitals.pulse||'') : '';
      document.getElementById('t-notes').value     = data ? (data.notes||'') : '';
      document.getElementById('med-rows').innerHTML = '';
      var meds = data && Array.isArray(data.medications) ? data.medications : [];
      if (meds.length) meds.forEach(function(m){ addMedRow(m); });
      else addMedRow({});
      var btn = document.getElementById('tm-save');
      btn.disabled = false;
      btn.textContent = data ? 'Update Record' : 'Save Record';
      document.getElementById('treatment-modal').classList.add('open');
      setTimeout(function(){ document.getElementById('t-patient').focus(); }, 150);
    }

    function closeModal() { document.getElementById('treatment-modal').classList.remove('open'); }

    async function saveTreatment() {
      var patientId = document.getElementById('t-patient').value;
      var diagnosis = document.getElementById('t-diagnosis').value.trim();
      if (!patientId) { Utils.toast('Please select a patient.','error'); return; }
      if (!diagnosis) { Utils.toast('Diagnosis is required.','error'); document.getElementById('t-diagnosis').focus(); return; }
      var btn = document.getElementById('tm-save');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
      var doctorId = document.getElementById('t-doctor').value;
      var pOpt = document.querySelector('#t-patient option[value="'+patientId+'"]');
      var dOpt = document.querySelector('#t-doctor option[value="'+doctorId+'"]');
      var editId = document.getElementById('edit-id').value;
      var payload = {
        patientId: patientId, doctorId: doctorId,
        patientName: pOpt ? pOpt.dataset.name : '',
        doctorName:  dOpt ? dOpt.dataset.name : '',
        visitDate:     document.getElementById('t-date').value,
        visitType:     document.getElementById('t-type').value,
        symptoms:      document.getElementById('t-symptoms').value.trim(),
        diagnosis:     diagnosis,
        treatmentPlan: document.getElementById('t-plan').value.trim(),
        medications:   collectMeds(),
        labTests:      document.getElementById('t-labs').value.trim(),
        followUpDate:  document.getElementById('t-followup').value,
        vitals: { bp: document.getElementById('t-bp').value.trim(), temp: document.getElementById('t-temp').value.trim(), weight: document.getElementById('t-weight').value.trim(), pulse: document.getElementById('t-pulse').value.trim() },
        notes: document.getElementById('t-notes').value.trim(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      try {
        if (editId) {
          await db.collection('treatments').doc(editId).update(payload);
          Utils.toast('Record updated.','success');
        } else {
          payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('treatments').add(payload);
          Utils.toast('Treatment record saved.','success');
        }
        closeModal();
      } catch(err) {
        Utils.toast('Error: '+err.message,'error');
        btn.disabled = false; btn.textContent = editId ? 'Update Record' : 'Save Record';
      }
    }

    function viewTreatment(id) {
      var t = allTreatments.find(function(x){ return x.id===id; });
      if (!t) return;
      var meds = Array.isArray(t.medications) && t.medications.length
        ? '<table style="font-size:.83rem;width:100%;border-collapse:collapse;"><thead><tr style="background:var(--surface-2);"><th style="padding:.4rem .6rem;text-align:left;">Name</th><th style="padding:.4rem .6rem;text-align:left;">Dosage</th><th style="padding:.4rem .6rem;text-align:left;">Frequency</th></tr></thead><tbody>'
          + t.medications.map(function(m){ return '<tr><td style="padding:.4rem .6rem;">'+m.name+'</td><td style="padding:.4rem .6rem;">'+m.dosage+'</td><td style="padding:.4rem .6rem;">'+m.frequency+'</td></tr>'; }).join('')
          + '</tbody></table>'
        : '<p class="text-muted text-sm">No medications recorded.</p>';

      document.getElementById('view-body').innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;">'
        +'<div><span class="text-muted text-xs">Patient</span><p><strong>'+(t.patientName||'—')+'</strong></p></div>'
        +'<div><span class="text-muted text-xs">Doctor</span><p><strong>'+(t.doctorName||'—')+'</strong></p></div>'
        +'<div><span class="text-muted text-xs">Visit Date</span><p>'+(t.visitDate||'—')+'</p></div>'
        +'<div><span class="text-muted text-xs">Visit Type</span><p>'+Utils.badge(t.visitType||'consultation','teal')+'</p></div>'
        +'</div>'
        +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;background:var(--surface-2);padding:1rem;border-radius:10px;margin-bottom:1.25rem;">'
        +'<div><span class="text-muted text-xs">BP</span><p class="font-bold">'+(t.vitals&&t.vitals.bp||'—')+'</p></div>'
        +'<div><span class="text-muted text-xs">Temp</span><p class="font-bold">'+(t.vitals&&t.vitals.temp||'—')+'</p></div>'
        +'<div><span class="text-muted text-xs">Weight</span><p class="font-bold">'+(t.vitals&&t.vitals.weight||'—')+'</p></div>'
        +'<div><span class="text-muted text-xs">Pulse</span><p class="font-bold">'+(t.vitals&&t.vitals.pulse||'—')+'</p></div>'
        +'</div>'
        +(t.symptoms?'<div class="mb-2"><strong class="text-xs" style="text-transform:uppercase;color:var(--text-muted);">Symptoms</strong><p style="margin-top:.35rem;">'+t.symptoms+'</p></div>':'')
        +'<div class="mb-2"><strong class="text-xs" style="text-transform:uppercase;color:var(--text-muted);">Diagnosis</strong><p style="margin-top:.35rem;">'+(t.diagnosis||'—')+'</p></div>'
        +(t.treatmentPlan?'<div class="mb-2"><strong class="text-xs" style="text-transform:uppercase;color:var(--text-muted);">Treatment Plan</strong><p style="margin-top:.35rem;">'+t.treatmentPlan+'</p></div>':'')
        +'<div class="mb-2"><strong class="text-xs" style="text-transform:uppercase;color:var(--text-muted);">Medications</strong><div style="margin-top:.5rem;">'+meds+'</div></div>'
        +(t.labTests?'<div class="mb-2"><strong class="text-xs" style="text-transform:uppercase;color:var(--text-muted);">Lab Tests</strong><p style="margin-top:.35rem;">'+t.labTests+'</p></div>':'')
        +(t.followUpDate?'<div class="mb-2"><strong class="text-xs" style="text-transform:uppercase;color:var(--text-muted);">Follow-up</strong><p style="margin-top:.35rem;">'+t.followUpDate+'</p></div>':'')
        +(t.notes?'<div style="background:var(--teal-50);border-left:3px solid var(--teal-500);padding:.75rem 1rem;border-radius:0 8px 8px 0;margin-top:1rem;"><strong class="text-xs" style="color:var(--teal-700);text-transform:uppercase;">Doctor\'s Notes</strong><p style="margin-top:.35rem;font-size:.88rem;">'+t.notes+'</p></div>':'');

      document.getElementById('view-modal').classList.add('open');
    }

    function closeViewModal() { document.getElementById('view-modal').classList.remove('open'); }

    function editTreatment(id) {
      var t = allTreatments.find(function(x){ return x.id===id; });
      if (t) openModal(t);
    }

    async function deleteTreatment(id) {
      if (!confirm('Delete this treatment record?')) return;
      try {
        await db.collection('treatments').doc(id).delete();
        Utils.toast('Record deleted.','info');
      } catch(err) { Utils.toast('Error: '+err.message,'error'); }
    }

    init();
  </script>
</body>
</html>
